<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Spyhunter-Style Overhead Driver</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin:0; height:100%; background:#0b0f14; font-family: system-ui, Segoe UI, Arial, sans-serif; }
    #wrap { height:100%; display:flex; align-items:center; justify-content:center; padding:12px; box-sizing:border-box; }
    canvas { background:#070a0f; border:1px solid #223; border-radius:12px; max-width: min(900px, 98vw); max-height: 92vh; width: 900px; height: 540px; image-rendering: pixelated; }
    .hud {
      position: fixed; left: 14px; top: 12px; display:flex; gap:10px; flex-wrap:wrap;
      background: rgba(10,14,20,.55); border:1px solid rgba(120,140,200,.18);
      padding:10px 12px; border-radius:12px; backdrop-filter: blur(6px);
      font-size: 14px;
    }
    .hud b { font-weight: 700; }
    .help {
      position: fixed; right: 14px; top: 12px; max-width: 380px;
      background: rgba(10,14,20,.55); border:1px solid rgba(120,140,200,.18);
      padding:10px 12px; border-radius:12px; backdrop-filter: blur(6px);
      font-size: 13px; line-height:1.35;
    }
    .help kbd { font: 12px/1.1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      padding: 2px 6px; border-radius: 6px; border: 1px solid rgba(200,220,255,.18);
      background: rgba(255,255,255,.06);
    }
    .toast {
      position: fixed; left: 50%; transform: translateX(-50%);
      bottom: 16px; text-align:center; padding: 10px 14px;
      background: rgba(10,14,20,.72); border:1px solid rgba(120,140,200,.22);
      border-radius: 999px; font-size: 14px;
      opacity: 0; pointer-events:none; transition: opacity .2s ease;
    }
    .toast.show { opacity: 1; }
    @media (max-width: 820px) {
      .help { display:none; }
    }
  </style>
</head>
<body>
  <div class="hud" id="hud"></div>
  <div class="help">
    <div><b>Controls</b></div>
    <div><kbd>W</kbd>/<kbd>↑</kbd> accelerate · <kbd>S</kbd>/<kbd>↓</kbd> brake</div>
    <div><kbd>A</kbd>/<kbd>←</kbd> steer left · <kbd>D</kbd>/<kbd>→</kbd> steer right</div>
    <div><kbd>Space</kbd> shoot · <kbd>P</kbd> pause · <kbd>R</kbd> restart</div>
    <div style="margin-top:6px; opacity:.85">
      Dodge traffic & road hazards. Shoot obstacles to clear the lane.
      Survive long enough to reach the next “sector” (difficulty ramps up).
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <div id="wrap">
    <canvas id="game" width="900" height="540"></canvas>
  </div>

<script>
(() => {
  "use strict";

  // --- Canvas setup ---
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d", { alpha: false });

  // --- Utility ---
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  const lerp = (a, b, t) => a + (b - a) * t;
  const rand = (a, b) => a + Math.random() * (b - a);
  const chance = (p) => Math.random() < p;

  // --- Input ---
  const keys = new Set();
  window.addEventListener("keydown", (e) => {
    // prevent page scroll with arrows/space
    if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
    keys.add(e.key.toLowerCase());
    if (e.key.toLowerCase() === "p") togglePause();
    if (e.key.toLowerCase() === "r") restart();
  }, { passive: false });
  window.addEventListener("keyup", (e) => keys.delete(e.key.toLowerCase()));

  // --- Game constants ---
  const W = canvas.width, H = canvas.height;
  const ROAD_W = 520;
  const ROAD_X = (W - ROAD_W) / 2;
  const LANE_COUNT = 3;
  const LANE_W = ROAD_W / LANE_COUNT;

  const COLORS = {
    sky: "#070a0f",
    roadside: "#0c1320",
    road: "#161c26",
    lane: "rgba(220,235,255,0.14)",
    stripe: "rgba(255,255,255,0.35)",
    player: "#7bd0ff",
    playerDark: "#2b6a86",
    traffic: "#ff7b7b",
    trafficDark: "#7a2b2b",
    obstacle: "#ffd27b",
    obstacleDark: "#7a5a22",
    bullet: "#e9f3ff",
    spark: "#ffd18a",
    text: "rgba(235,245,255,0.92)",
    dim: "rgba(235,245,255,0.72)",
  };

  // --- Audio (tiny, optional; kept minimal to avoid lag) ---
  let audioCtx = null;
  function beep(freq=440, dur=0.06, type="square", vol=0.05) {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type;
      o.frequency.value = freq;
      g.gain.value = vol;
      o.connect(g); g.connect(audioCtx.destination);
      o.start();
      o.stop(audioCtx.currentTime + dur);
    } catch {}
  }

  // --- Entities ---
  const bullets = [];
  const cars = [];
  const obstacles = [];
  const particles = [];

  function rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function spawnExplosion(x, y, power=1) {
    const count = Math.floor(16 * power);
    for (let i = 0; i < count; i++) {
      const ang = rand(0, Math.PI*2);
      const spd = rand(40, 240) * power;
      particles.push({
        x, y,
        vx: Math.cos(ang)*spd,
        vy: Math.sin(ang)*spd,
        life: rand(0.25, 0.55),
        t: 0,
        size: rand(1.5, 3.5) * power
      });
    }
  }

  // --- Player ---
  const player = {
    x: W/2,
    y: H*0.78,
    w: 34,
    h: 56,
    vx: 0,
    speed: 0,        // forward speed scalar (0..1)
    maxSide: 420,    // max lateral speed (px/s)
    accel: 1.6,      // speed-up per second
    brake: 2.4,      // slow-down per second
    fireCooldown: 0,
    hp: 3,
  };

  // --- Game state ---
  let running = true;
  let paused = false;
  let last = performance.now();
  let time = 0;

  let score = 0;
  let sector = 1;          // difficulty level
  let distance = 0;        // "progress"
  let nextSectorAt = 850;  // when to ramp difficulty
  let shake = 0;

  // spawn pacing (seconds)
  let trafficSpawnT = 0;
  let obstacleSpawnT = 0;

  const toast = document.getElementById("toast");
  function showToast(msg, ms=1400) {
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(showToast._t);
    toast._t = setTimeout(() => toast.classList.remove("show"), ms);
  }

  function togglePause() {
    if (!running) return;
    paused = !paused;
    showToast(paused ? "Paused" : "Unpaused", 900);
  }

  function restart() {
    // reset everything
    bullets.length = 0;
    cars.length = 0;
    obstacles.length = 0;
    particles.length = 0;

    player.x = W/2;
    player.y = H*0.78;
    player.vx = 0;
    player.speed = 0;
    player.fireCooldown = 0;
    player.hp = 3;

    score = 0;
    sector = 1;
    distance = 0;
    nextSectorAt = 850;

    trafficSpawnT = 0;
    obstacleSpawnT = 0;

    shake = 0;
    running = true;
    paused = false;
    showToast("Restarted", 900);
  }

  function gameOver() {
    running = false;
    paused = false;
    showToast("Game Over — Press R to restart", 2500);
  }

  // --- Spawning helpers ---
  function laneCenter(laneIndex) {
    return ROAD_X + laneIndex * LANE_W + LANE_W/2;
  }

  function spawnTraffic() {
    // traffic spawns in lanes; avoid immediate overlap
    const lane = Math.floor(rand(0, LANE_COUNT));
    const x = laneCenter(lane);
    const w = 34, h = 58;

    const y = -h - 10;
    const base = 140 + sector*10;
    const vy = base + rand(0, 90) - player.speed*120; // relative movement handled in update

    const car = { x: x - w/2, y, w, h, vy, lane, hp: 1 };
    // avoid stacking too tightly
    for (const c of cars) {
      if (Math.abs((c.x+c.w/2) - x) < 8 && Math.abs(c.y - y) < 120) return;
    }
    cars.push(car);
  }

  function spawnObstacle() {
    // obstacles can be lane-centered or partial-block hazards
    const lane = Math.floor(rand(0, LANE_COUNT));
    const centered = chance(0.7);
    const w = centered ? rand(46, 64) : rand(30, 46);
    const h = centered ? rand(34, 46) : rand(30, 40);

    const cx = centered ? laneCenter(lane) : (ROAD_X + rand(0.12, 0.88) * ROAD_W);
    const x = clamp(cx - w/2, ROAD_X + 8, ROAD_X + ROAD_W - w - 8);
    const y = -h - 10;

    const hp = centered ? 2 : 1; // bigger obstacles take 2 shots
    obstacles.push({ x, y, w, h, hp, spin: rand(-2, 2) });
  }

  // --- Update loop ---
  function update(dt) {
    time += dt;

    // controls
    const left = keys.has("a") || keys.has("arrowleft");
    const right = keys.has("d") || keys.has("arrowright");
    const up = keys.has("w") || keys.has("arrowup");
    const down = keys.has("s") || keys.has("arrowdown");
    const fire = keys.has(" ");

    // speed control
    if (up) player.speed = clamp(player.speed + player.accel*dt, 0, 1);
    else player.speed = clamp(player.speed - 0.55*dt, 0, 1); // gentle natural decel
    if (down) player.speed = clamp(player.speed - player.brake*dt, 0, 1);

    // lateral steering: more responsive at higher speed
    const steer = (right ? 1 : 0) - (left ? 1 : 0);
    const targetVx = steer * player.maxSide * (0.65 + 0.55*player.speed);
    player.vx = lerp(player.vx, targetVx, 10*dt);
    player.x += player.vx * dt;

    // keep within road boundaries
    const minX = ROAD_X + 10 + player.w/2;
    const maxX = ROAD_X + ROAD_W - 10 - player.w/2;
    player.x = clamp(player.x, minX, maxX);

    // shooting
    player.fireCooldown -= dt;
    if (fire && player.fireCooldown <= 0 && running) {
      const bx = player.x;
      const by = player.y - player.h/2 - 6;
      bullets.push({ x: bx-2, y: by, w: 4, h: 10, vy: -720 });
      player.fireCooldown = 0.13; // rate of fire
      beep(780, 0.03, "square", 0.04);
    }

    // difficulty progression via distance
    const speedPx = 240 + 520 * player.speed; // "world scroll" speed
    distance += speedPx * dt * 0.12;          // scale to feel right

    if (distance >= nextSectorAt) {
      sector++;
      nextSectorAt += 900 + sector*80;
      showToast(`Sector ${sector}! Traffic + hazards increased`, 1700);
      beep(220, 0.08, "sawtooth", 0.05);
      beep(330, 0.08, "sawtooth", 0.05);
    }

    // spawn cadence (faster as sector increases)
    trafficSpawnT -= dt;
    obstacleSpawnT -= dt;

    const trafficInterval = clamp(0.65 - sector*0.03, 0.22, 0.65);
    const obstacleInterval = clamp(0.95 - sector*0.04, 0.28, 0.95);

    if (trafficSpawnT <= 0) {
      spawnTraffic();
      // randomize a bit
      trafficSpawnT = trafficInterval * rand(0.75, 1.25);
    }
    if (obstacleSpawnT <= 0) {
      // bias obstacles to appear more when you're going fast
      if (chance(0.65 + 0.25*player.speed)) spawnObstacle();
      obstacleSpawnT = obstacleInterval * rand(0.75, 1.35);
    }

    // update bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.y += b.vy * dt;
      if (b.y + b.h < -30) bullets.splice(i, 1);
    }

    // move world entities relative to player speed (scrolling)
    // Entities move downwards; faster player speed means they move slower relative to you.
    const worldVy = 250 + sector*22;   // base scroll
    const relVy = worldVy + 520*(1 - player.speed); // when speed is low, things rush at you

    // update traffic cars
    for (let i = cars.length - 1; i >= 0; i--) {
      const c = cars[i];

      // small lane wiggle sometimes
      if (chance(0.02 * dt * (1 + sector*0.2))) {
        const dir = chance(0.5) ? -1 : 1;
        c.x += dir * rand(10, 24);
      }

      c.y += (relVy + c.vy*0.15) * dt;

      // collisions with player
      const playerRect = { x: player.x - player.w/2, y: player.y - player.h/2, w: player.w, h: player.h };
      if (rectsOverlap(playerRect, c)) {
        cars.splice(i, 1);
        player.hp--;
        shake = Math.max(shake, 10);
        spawnExplosion(player.x, player.y, 0.9);
        beep(120, 0.08, "square", 0.06);
        if (player.hp <= 0) gameOver();
        continue;
      }

      if (c.y > H + 80) cars.splice(i, 1);
    }

    // update obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      o.y += relVy * dt;
      // collisions with player
      const playerRect = { x: player.x - player.w/2, y: player.y - player.h/2, w: player.w, h: player.h };
      if (rectsOverlap(playerRect, o)) {
        obstacles.splice(i, 1);
        player.hp--;
        shake = Math.max(shake, 12);
        spawnExplosion(player.x, player.y, 1.0);
        beep(100, 0.09, "square", 0.06);
        if (player.hp <= 0) gameOver();
        continue;
      }
      if (o.y > H + 80) obstacles.splice(i, 1);
    }

    // bullet collisions
    for (let bi = bullets.length - 1; bi >= 0; bi--) {
      const b = bullets[bi];
      let hit = false;

      // hit obstacle first (priority)
      for (let oi = obstacles.length - 1; oi >= 0; oi--) {
        const o = obstacles[oi];
        if (rectsOverlap(b, o)) {
          hit = true;
          o.hp--;
          spawnExplosion(b.x + b.w/2, b.y, 0.55);
          shake = Math.max(shake, 2);
          beep(520, 0.03, "triangle", 0.04);
          if (o.hp <= 0) {
            obstacles.splice(oi, 1);
            spawnExplosion(o.x + o.w/2, o.y + o.h/2, 0.95);
            score += 75;
            beep(240, 0.05, "sawtooth", 0.04);
          } else {
            score += 20;
          }
          break;
        }
      }

      if (!hit) {
        // optionally hit traffic (worth fewer points; also clears space)
        for (let ci = cars.length - 1; ci >= 0; ci--) {
          const c = cars[ci];
          if (rectsOverlap(b, c)) {
            hit = true;
            cars.splice(ci, 1);
            spawnExplosion(c.x + c.w/2, c.y + c.h/2, 0.85);
            score += 40;
            shake = Math.max(shake, 3);
            beep(260, 0.05, "square", 0.05);
            break;
          }
        }
      }

      if (hit) bullets.splice(bi, 1);
    }

    // particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.t += dt;
      const k = p.t / p.life;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= (1 - 3.5*dt);
      p.vy *= (1 - 3.5*dt);
      if (k >= 1) particles.splice(i, 1);
    }

    // scoring for survival (distance)
    score += dt * (10 + sector*2) * (0.35 + 0.65*player.speed);

    // decay camera shake
    shake = Math.max(0, shake - 28*dt);
  }

  // --- Drawing ---
  let scroll = 0;
  function draw(dt) {
    // background
    ctx.fillStyle = COLORS.sky;
    ctx.fillRect(0, 0, W, H);

    // camera shake
    const sx = (Math.random()*2 - 1) * shake;
    const sy = (Math.random()*2 - 1) * shake;
    ctx.save();
    ctx.translate(sx, sy);

    // roadside
    ctx.fillStyle = COLORS.roadside;
    ctx.fillRect(0, 0, ROAD_X, H);
    ctx.fillRect(ROAD_X + ROAD_W, 0, W - (ROAD_X + ROAD_W), H);

    // road
    ctx.fillStyle = COLORS.road;
    ctx.fillRect(ROAD_X, 0, ROAD_W, H);

    // scrolling stripes
    const speedPx = 240 + 520 * player.speed;
    scroll = (scroll + (speedPx + sector*24) * dt) % 80;

    // lane separators
    ctx.strokeStyle = COLORS.lane;
    ctx.lineWidth = 2;
    for (let i = 1; i < LANE_COUNT; i++) {
      const x = ROAD_X + i * LANE_W;
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }

    // dashed center stripes per lane
    ctx.strokeStyle = COLORS.stripe;
    ctx.lineWidth = 3;
    ctx.setLineDash([20, 18]);
    for (let i = 0; i < LANE_COUNT; i++) {
      const x = laneCenter(i);
      ctx.beginPath();
      ctx.moveTo(x, -80 + scroll);
      ctx.lineTo(x, H + 80);
      ctx.stroke();
    }
    ctx.setLineDash([]);

    // roadside detail (trees/poles as simple blocks)
    const sideCount = 10;
    for (let i = 0; i < sideCount; i++) {
      const y = ((i * 90) + scroll*1.1) % (H + 120) - 80;
      // left
      ctx.fillStyle = "rgba(120,170,120,0.18)";
      ctx.fillRect(24, y, 18, 28);
      ctx.fillStyle = "rgba(255,255,255,0.06)";
      ctx.fillRect(44, y+6, 6, 18);
      // right
      ctx.fillStyle = "rgba(120,170,120,0.18)";
      ctx.fillRect(W-42, y, 18, 28);
      ctx.fillStyle = "rgba(255,255,255,0.06)";
      ctx.fillRect(W-52, y+6, 6, 18);
    }

    // draw obstacles
    for (const o of obstacles) {
      ctx.save();
      const cx = o.x + o.w/2, cy = o.y + o.h/2;
      ctx.translate(cx, cy);
      ctx.rotate(o.spin * 0.02);
      ctx.translate(-cx, -cy);

      ctx.fillStyle = COLORS.obstacleDark;
      ctx.fillRect(o.x, o.y, o.w, o.h);

      ctx.fillStyle = COLORS.obstacle;
      ctx.fillRect(o.x+3, o.y+3, o.w-6, o.h-6);

      // little "hazard" marks
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.fillRect(o.x+o.w*0.22, o.y+o.h*0.25, o.w*0.12, o.h*0.5);
      ctx.fillRect(o.x+o.w*0.66, o.y+o.h*0.25, o.w*0.12, o.h*0.5);

      // HP pips
      if (o.hp > 1) {
        ctx.fillStyle = "rgba(10,14,20,0.55)";
        ctx.fillRect(o.x, o.y-10, o.w, 6);
        ctx.fillStyle = "rgba(255,255,255,0.65)";
        ctx.fillRect(o.x+2, o.y-9, (o.w-4) * (o.hp/2), 4);
      }

      ctx.restore();
    }

    // draw traffic cars
    for (const c of cars) {
      ctx.fillStyle = COLORS.trafficDark;
      ctx.fillRect(c.x, c.y, c.w, c.h);
      ctx.fillStyle = COLORS.traffic;
      ctx.fillRect(c.x+3, c.y+6, c.w-6, c.h-12);

      // windshield
      ctx.fillStyle = "rgba(10,14,20,0.35)";
      ctx.fillRect(c.x+6, c.y+10, c.w-12, 12);

      // taillights
      ctx.fillStyle = "rgba(255,255,255,0.16)";
      ctx.fillRect(c.x+6, c.y+c.h-16, 6, 8);
      ctx.fillRect(c.x+c.w-12, c.y+c.h-16, 6, 8);
    }

    // draw bullets
    ctx.fillStyle = COLORS.bullet;
    for (const b of bullets) {
      ctx.fillRect(b.x, b.y, b.w, b.h);
    }

    // draw player car
    const px = player.x - player.w/2;
    const py = player.y - player.h/2;

    ctx.fillStyle = COLORS.playerDark;
    ctx.fillRect(px, py, player.w, player.h);

    ctx.fillStyle = COLORS.player;
    ctx.fillRect(px+3, py+6, player.w-6, player.h-12);

    // windshield
    ctx.fillStyle = "rgba(10,14,20,0.35)";
    ctx.fillRect(px+6, py+10, player.w-12, 14);

    // headlights
    ctx.fillStyle = "rgba(255,255,255,0.22)";
    ctx.fillRect(px+6, py+6, 6, 8);
    ctx.fillRect(px+player.w-12, py+6, 6, 8);

    // particles
    for (const p of particles) {
      const k = p.t / p.life;
      const a = 1 - k;
      ctx.fillStyle = `rgba(255, 210, 140, ${a})`;
      ctx.fillRect(p.x, p.y, p.size, p.size);
    }

    ctx.restore(); // shake

    // overlay messages
    if (!running) {
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = COLORS.text;
      ctx.font = "700 42px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("GAME OVER", W/2, H/2 - 12);
      ctx.font = "500 18px system-ui, sans-serif";
      ctx.fillStyle = COLORS.dim;
      ctx.fillText("Press R to restart", W/2, H/2 + 26);
      ctx.textAlign = "left";
    } else if (paused) {
      ctx.fillStyle = "rgba(0,0,0,0.40)";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = COLORS.text;
      ctx.font = "700 38px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("PAUSED", W/2, H/2);
      ctx.textAlign = "left";
    }
  }

  // --- HUD ---
  const hud = document.getElementById("hud");
  function updateHUD() {
    const spd = Math.round(player.speed * 100);
    hud.innerHTML = `
      <div><b>HP:</b> ${"❤".repeat(player.hp)}${"·".repeat(Math.max(0, 3-player.hp))}</div>
      <div><b>Score:</b> ${Math.floor(score)}</div>
      <div><b>Speed:</b> ${spd}%</div>
      <div><b>Sector:</b> ${sector}</div>
    `;
  }

  // --- Main loop ---
  function frame(now) {
    const dtRaw = (now - last) / 1000;
    last = now;

    // clamp dt to avoid huge jumps if tab was inactive
    const dt = clamp(dtRaw, 0, 1/20);

    if (running && !paused) update(dt);
    draw(dt);
    updateHUD();

    requestAnimationFrame(frame);
  }

  // Start with a tiny hint
  showToast("WASD/Arrows to drive • Space to shoot • P pause • R restart", 2400);
  requestAnimationFrame(frame);

})();
</script>
